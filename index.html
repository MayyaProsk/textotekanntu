<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaLevels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="stage" id="stage"></div>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light / dark theme" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.4"/>
      <line x1="12" y1="2"   x2="12" y2="5"   stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="12" y1="19"  x2="12" y2="22"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2"  y1="12"  x2="5"  y2="12"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="19" y1="12"  x2="22" y2="12"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="4.93" y1="4.93"  x2="7.05" y2="7.05"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="16.95" y1="16.95" x2="19.07" y2="19.07" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="4.93" y1="19.07" x2="7.05" y2="16.95" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="16.95" y1="7.05" x2="19.07" y2="4.93" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
